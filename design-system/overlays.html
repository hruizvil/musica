<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'capoeira-gold': '#D4A017', 'capoeira-brown': '#6B3A2A',
    'capoeira-green': '#2D5016', 'capoeira-cream': '#F5F0E8', 'capoeira-night': '#1A1208',
  }, fontFamily: { sans: ['Inter','system-ui','sans-serif'], display: ['"Playfair Display"','Georgia','serif'] } } }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-100 p-8 font-sans">
  <h2 class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-6">Overlays & Modals</h2>

  <div class="space-y-8">

    <!-- Confirmation Modal -->
    <div class="space-y-3">
      <p class="text-[10px] font-bold uppercase tracking-widest text-stone-300">Confirmation Modal</p>
      <div class="relative w-80 bg-white rounded-2xl border border-stone-200 p-6 space-y-4 shadow-xl">
        <div>
          <h3 class="font-display text-lg font-bold text-stone-800 mb-1">Apagar música</h3>
          <p class="text-sm text-stone-500">Tem certeza que deseja apagar <strong class="text-stone-700">Paranauê</strong>? Esta ação não pode ser desfeita.</p>
        </div>
        <div class="flex gap-2">
          <button class="flex-1 px-3 py-1.5 rounded-lg border border-stone-200 text-stone-500 text-sm hover:bg-stone-50 transition-colors">Cancelar</button>
          <button class="flex-1 px-3 py-1.5 rounded-lg bg-red-500 text-white text-sm font-semibold hover:bg-red-600 transition-colors">Apagar</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div class="space-y-3">
      <p class="text-[10px] font-bold uppercase tracking-widest text-stone-300">Inline Status Messages</p>
      <div class="space-y-2 max-w-xs">
        <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Música salva com sucesso.
        </div>
        <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
          Erro ao salvar. Verifique sua conexão.
        </div>
      </div>
    </div>

    <!-- Mobile Header -->
    <div class="space-y-3">
      <p class="text-[10px] font-bold uppercase tracking-widest text-stone-300">Mobile Back Bar</p>
      <div class="w-80 flex items-center gap-2 px-4 py-2.5 border-b border-stone-200 bg-white rounded-t-xl shadow-sm">
        <button class="flex items-center gap-1.5 text-sm text-capoeira-brown font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Músicas
        </button>
        <div class="ml-auto flex items-center gap-1 text-xs text-amber-600">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
          Não salvo
        </div>
        <button class="text-xs text-stone-400 font-medium px-2 py-1 rounded hover:bg-stone-50">✕</button>
      </div>
    </div>

  </div>
</body>
</html>
