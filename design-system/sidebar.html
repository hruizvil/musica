<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    'capoeira-gold': '#D4A017', 'capoeira-brown': '#6B3A2A',
    'capoeira-green': '#2D5016', 'capoeira-cream': '#F5F0E8', 'capoeira-night': '#1A1208',
  }, fontFamily: { sans: ['Inter','system-ui','sans-serif'], display: ['"Playfair Display"','Georgia','serif'] } } }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-stone-50 p-8 font-sans">
  <h2 class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-6">Sidebar & Navigation</h2>

  <div class="flex gap-6 flex-wrap">

    <!-- Admin Sidebar Panel -->
    <div class="w-64 bg-white border border-stone-200 rounded-xl overflow-hidden shadow-sm">
      <!-- Sidebar Header -->
      <div class="h-14 bg-white border-b border-stone-200 flex items-center px-5 gap-3 shadow-sm">
        <span class="font-display text-sm font-bold text-capoeira-brown">Abadá Música</span>
        <svg class="w-4 h-4 text-stone-300 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        <span class="text-sm text-stone-400">Admin</span>
        <div class="ml-auto flex items-center gap-1 text-xs text-amber-600">
          <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
          Não salvo
        </div>
      </div>

      <!-- Search -->
      <div class="p-3 border-b border-stone-100">
        <div class="relative">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Filtrar músicas..."
            class="w-full pl-8 pr-3 py-1.5 rounded-md border border-stone-200 bg-stone-50 text-stone-800 text-xs placeholder-stone-300 focus:outline-none focus:ring-1 focus:ring-capoeira-gold" />
        </div>
      </div>

      <!-- Song List -->
      <div class="divide-y divide-stone-100">
        <!-- Selected item -->
        <div class="flex items-center group bg-amber-50 border-l-2 border-capoeira-gold">
          <div class="flex-1 flex items-center gap-2.5 pl-3 pr-2 py-2.5 min-w-0">
            <span class="w-2 h-2 rounded-full bg-amber-400 shrink-0"></span>
            <div class="min-w-0">
              <p class="text-sm text-stone-700 truncate font-medium">Paranauê</p>
              <p class="text-xs text-stone-400">São Bento Grande</p>
            </div>
          </div>
        </div>
        <!-- Default item -->
        <div class="flex items-center group border-l-2 border-transparent hover:bg-stone-50">
          <div class="flex-1 flex items-center gap-2.5 pl-3 pr-2 py-2.5 min-w-0">
            <span class="w-2 h-2 rounded-full bg-emerald-400 shrink-0"></span>
            <div class="min-w-0">
              <p class="text-sm text-stone-700 truncate">É Roda, Vem Jogar</p>
              <p class="text-xs text-stone-400">Angola</p>
            </div>
          </div>
        </div>
        <!-- Default item -->
        <div class="flex items-center group border-l-2 border-transparent hover:bg-stone-50">
          <div class="flex-1 flex items-center gap-2.5 pl-3 pr-2 py-2.5 min-w-0">
            <span class="w-2 h-2 rounded-full bg-sky-400 shrink-0"></span>
            <div class="min-w-0">
              <p class="text-sm text-stone-700 truncate">Zum Zum Zum</p>
              <p class="text-xs text-stone-400">Idalina</p>
            </div>
          </div>
        </div>
        <!-- Bulk select item (red) -->
        <div class="flex items-center group bg-red-50 border-l-2 border-red-300">
          <div class="flex items-center gap-2.5 pl-3 pr-2 py-2.5 min-w-0 flex-1">
            <input type="checkbox" checked class="w-4 h-4 shrink-0 accent-red-500" />
            <div class="min-w-0">
              <p class="text-sm text-stone-700 truncate">Dona Maria</p>
              <p class="text-xs text-stone-400">São Bento Pequeno</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom action -->
      <div class="p-3 border-t border-stone-100">
        <button class="w-full flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg bg-capoeira-brown text-white text-sm font-semibold">
          + Adicionar música
        </button>
      </div>
    </div>

    <!-- Dropdown / Autocomplete -->
    <div class="w-56 space-y-3">
      <p class="text-[10px] font-bold uppercase tracking-widest text-stone-300">Autocomplete Dropdown</p>
      <div class="bg-white border border-stone-200 rounded-lg shadow-lg overflow-hidden">
        <div class="px-3 pt-2 pb-1">
          <p class="text-[10px] font-bold text-stone-300 uppercase tracking-widest mb-1">Angola</p>
          <button class="w-full text-left px-2 py-1.5 rounded text-sm text-stone-700 hover:bg-stone-50 transition-colors">Angola</button>
          <button class="w-full text-left px-2 py-1.5 rounded text-sm bg-amber-50 text-amber-800 font-semibold transition-colors">Idalina</button>
        </div>
        <div class="px-3 pt-2 pb-1">
          <p class="text-[10px] font-bold text-stone-300 uppercase tracking-widest mb-1">Regional</p>
          <button class="w-full text-left px-2 py-1.5 rounded text-sm text-stone-700 hover:bg-stone-50 transition-colors">São Bento Grande</button>
          <button class="w-full text-left px-2 py-1.5 rounded text-sm text-stone-700 hover:bg-stone-50 transition-colors">São Bento Pequeno</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
